name: Export SailPoint ISC Configuration

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to export from (DEV, UAT, PROD)'
        required: true
        default: 'DEV'
        type: choice
        options:
          - DEV
          - UAT
          - PROD

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq

      - name: Resolve Environment Details
        run: |
          ENV_UPPER="${{ github.event.inputs.environment }}"
          if [[ "$ENV_UPPER" == "PROD" ]]; then
            echo "SAIL_BASE_URL=${{ secrets.PROD_TENANT_URL }}" >> $GITHUB_ENV
            echo "SAIL_CLIENT_ID=${{ secrets.PROD_CLIENT_ID }}" >> $GITHUB_ENV
            echo "SAIL_CLIENT_SECRET=${{ secrets.PROD_CLIENT_SECRET }}" >> $GITHUB_ENV
          elif [[ "$ENV_UPPER" == "UAT" ]]; then
            echo "SAIL_BASE_URL=${{ secrets.UAT_TENANT_URL }}" >> $GITHUB_ENV
            echo "SAIL_CLIENT_ID=${{ secrets.UAT_CLIENT_ID }}" >> $GITHUB_ENV
            echo "SAIL_CLIENT_SECRET=${{ secrets.UAT_CLIENT_SECRET }}" >> $GITHUB_ENV
          else
            echo "SAIL_BASE_URL=${{ secrets.DEV_TENANT_URL }}" >> $GITHUB_ENV
            echo "SAIL_CLIENT_ID=${{ secrets.DEV_CLIENT_ID }}" >> $GITHUB_ENV
            echo "SAIL_CLIENT_SECRET=${{ secrets.DEV_CLIENT_SECRET }}" >> $GITHUB_ENV
          fi

      - name: Run Export Script
        run: |
          chmod +x scripts/export.sh
          ./scripts/export.sh

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Github Actions"
          git config --global user.email "actions@github.com"
          git add config/
          if git diff --cached --quiet; then
            echo "No changes in configurations to commit."
          else
            git commit -m "Automated export of configurations from ${{ github.event.inputs.environment }}"
            git push
          fi