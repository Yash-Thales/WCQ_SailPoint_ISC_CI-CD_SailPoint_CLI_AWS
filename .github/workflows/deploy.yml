name: Deploy SailPoint ISC Configuration

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Manual target environment (DEV, UAT, PROD)'
        required: true
        default: 'DEV'
        type: choice
        options:
          - DEV
          - UAT
          - PROD

  push:
    branches:
      - dev
      - uat
      - main

env:
  SAIL_CLI_VERSION: "2.2.12"

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Dynamically select environment name based on manual trigger or branch name
    environment:
      name: >-
        ${{ 
          github.event_name == 'workflow_dispatch' && github.event.inputs.environment ||
          github.ref_name == 'main' && 'PROD' || 
          github.ref_name == 'uat' && 'UAT' || 
          'DEV' 
        }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq

      - name: Resolve Environment
        run: |
          # Use the environment assigned to the job
          ENV_NAME="${{ steps.get-env.outputs.env || vars.ENV_NAME }}"
          # Fallback to resolving manually in bash
          TARGET_ENV=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TARGET_ENV="${{ github.event.inputs.environment }}"
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            TARGET_ENV="PROD"
          elif [[ "${GITHUB_REF_NAME}" == "uat" ]]; then
            TARGET_ENV="UAT"
          else
            TARGET_ENV="DEV"
          fi
          
          echo "ENV_NAME=$TARGET_ENV" >> $GITHUB_ENV
          
          if [[ "$TARGET_ENV" == "PROD" ]]; then
            echo "SAIL_BASE_URL=${{ secrets.PROD_TENANT_URL || secrets.SAIL_BASE_URL }}" >> $GITHUB_ENV
            echo "SAIL_CLIENT_ID=${{ secrets.PROD_CLIENT_ID || secrets.SAIL_CLIENT_ID }}" >> $GITHUB_ENV
            echo "SAIL_CLIENT_SECRET=${{ secrets.PROD_CLIENT_SECRET || secrets.SAIL_CLIENT_SECRET }}" >> $GITHUB_ENV
          elif [[ "$TARGET_ENV" == "UAT" ]]; then
            echo "SAIL_BASE_URL=${{ secrets.UAT_TENANT_URL || secrets.SAIL_BASE_URL }}" >> $GITHUB_ENV
            echo "SAIL_CLIENT_ID=${{ secrets.UAT_CLIENT_ID || secrets.SAIL_CLIENT_ID }}" >> $GITHUB_ENV
            echo "SAIL_CLIENT_SECRET=${{ secrets.UAT_CLIENT_SECRET || secrets.SAIL_CLIENT_SECRET }}" >> $GITHUB_ENV
          else
            echo "SAIL_BASE_URL=${{ secrets.DEV_TENANT_URL || secrets.SAIL_BASE_URL }}" >> $GITHUB_ENV
            echo "SAIL_CLIENT_ID=${{ secrets.DEV_CLIENT_ID || secrets.SAIL_CLIENT_ID }}" >> $GITHUB_ENV
            echo "SAIL_CLIENT_SECRET=${{ secrets.DEV_CLIENT_SECRET || secrets.SAIL_CLIENT_SECRET }}" >> $GITHUB_ENV
          fi

      - name: Install SailPoint CLI Engine
        run: |
          LATEST_VERSION=$(curl -s "https://api.github.com/repos/sailpoint-oss/sailpoint-cli/releases/latest" | jq -r '.tag_name')
          HARDCODED_VERSION="${{ env.SAIL_CLI_VERSION }}"
          
          LATEST_CLEAN=$(echo "$LATEST_VERSION" | sed 's/v//')
          HARDCODED_CLEAN=$(echo "$HARDCODED_VERSION" | sed 's/v//')
          
          echo "Hardcoded version: $HARDCODED_CLEAN"
          echo "Latest available version: $LATEST_CLEAN"
          
          if [ "$HARDCODED_CLEAN" != "$LATEST_CLEAN" ]; then
            echo "::warning::A new version of SailPoint CLI is available! (Current: $HARDCODED_CLEAN, Latest: $LATEST_CLEAN). Consider updating the env.SAIL_CLI_VERSION variable in your workflow file."
          fi
          
          curl -L -sS "https://github.com/sailpoint-oss/sailpoint-cli/releases/download/${HARDCODED_VERSION}/sail_${HARDCODED_CLEAN}_linux_amd64.deb" -o sailpoint-cli.deb
          sudo dpkg -i sailpoint-cli.deb

      - name: Run Deployment Script
        run: |
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh