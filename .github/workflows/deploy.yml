name: Deploy SailPoint ISC Configuration

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Manual target environment (DEV, UAT, PROD)'
        required: true
        default: 'DEV'
        type: choice
        options:
          - DEV
          - UAT
          - PROD

  push:
    branches:
      - dev
      - uat
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Dynamically select environment name based on manual trigger or branch name
    environment:
      name: >-
        ${{ 
          github.event_name == 'workflow_dispatch' && github.event.inputs.environment ||
          github.ref_name == 'main' && 'PROD' || 
          github.ref_name == 'uat' && 'UAT' || 
          'DEV' 
        }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq

      - name: Resolve Environment
        run: |
          # Use the environment assigned to the job
          ENV_NAME="${{ steps.get-env.outputs.env || vars.ENV_NAME }}"
          # Fallback to resolving manually in bash
          TARGET_ENV=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TARGET_ENV="${{ github.event.inputs.environment }}"
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            TARGET_ENV="PROD"
          elif [[ "${GITHUB_REF_NAME}" == "uat" ]]; then
            TARGET_ENV="UAT"
          else
            TARGET_ENV="DEV"
          fi
          
          echo "ENV_NAME=$TARGET_ENV" >> $GITHUB_ENV
          
          if [[ "$TARGET_ENV" == "PROD" ]]; then
            echo "SAIL_BASE_URL=${{ secrets.PROD_TENANT_URL }}" >> $GITHUB_ENV
            echo "SAIL_CLIENT_ID=${{ secrets.PROD_CLIENT_ID }}" >> $GITHUB_ENV
            echo "SAIL_CLIENT_SECRET=${{ secrets.PROD_CLIENT_SECRET }}" >> $GITHUB_ENV
          elif [[ "$TARGET_ENV" == "UAT" ]]; then
            echo "SAIL_BASE_URL=${{ secrets.UAT_TENANT_URL }}" >> $GITHUB_ENV
            echo "SAIL_CLIENT_ID=${{ secrets.UAT_CLIENT_ID }}" >> $GITHUB_ENV
            echo "SAIL_CLIENT_SECRET=${{ secrets.UAT_CLIENT_SECRET }}" >> $GITHUB_ENV
          else
            echo "SAIL_BASE_URL=${{ secrets.DEV_TENANT_URL }}" >> $GITHUB_ENV
            echo "SAIL_CLIENT_ID=${{ secrets.DEV_CLIENT_ID }}" >> $GITHUB_ENV
            echo "SAIL_CLIENT_SECRET=${{ secrets.DEV_CLIENT_SECRET }}" >> $GITHUB_ENV
          fi

      - name: Run Deployment Script
        run: |
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh