name: Validate SailPoint ISC Repository

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - dev
      - uat

  pull_request:
    branches:
      - main
      - dev
      - uat

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Run Validation Script
        run: |
          chmod +x scripts/validate.sh
          ./scripts/validate.sh